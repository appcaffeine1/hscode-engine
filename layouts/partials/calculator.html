<style>
  .calc-container { border: 2px solid #000; padding: 20px; border-radius: 8px; font-family: sans-serif; }
  .calc-input { font-size: 1.5rem; width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
  .calc-result { font-size: 2rem; font-weight: bold; color: #d32f2f; }
  .cpa-btn { display: none; background: #000; color: #fff; padding: 15px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 20px; border-radius: 4px; }
  .cpa-btn.active { display: block; }
</style>

<div class="calc-container">
  <h3>Import Duty & Tax Calculator</h3>
  <label for="priceInput">Product Value (USD):</label>
  <input type="number" id="priceInput" class="calc-input" placeholder="Enter value (e.g., 150)">
  
  <div>
    <p>Estimated Duty ({{- .Params.tariff_rate -}}%): $<span id="outTariff">0.00</span></p>
    <p>Estimated VAT ({{- .Params.vat_rate -}}%): $<span id="outVat">0.00</span></p>
    <hr>
    <p>Total Landed Cost: $<span id="outTotal" class="calc-result">0.00</span></p>
  </div>

  <a href="https://cpa-partner-link.com/checkout?ref={{ .Title }}" id="cpaBanner" class="cpa-btn">
    Claim Your Discount Now 🚀
  </a>
</div>

<script>
(function() {
  // 1. 빌드 타임에 Hugo 정적 데이터를 JS 상수로 강제 주입
  const T_RATE = parseFloat("{{- .Params.tariff_rate | default 0 -}}") / 100;
  const V_RATE = parseFloat("{{- .Params.vat_rate | default 0 -}}") / 100;
  
  // 2. DOM 요소 캐싱
  const inputEl = document.getElementById('priceInput');
  const tOut = document.getElementById('outTariff');
  const vOut = document.getElementById('outVat');
  const totalOut = document.getElementById('outTotal');
  const cpaBtn = document.getElementById('cpaBanner');

  // 3. Zero-latency 연산 엔진
  inputEl.addEventListener('input', function() {
    let p = Number(this.value); 
    if (p <= 0 || isNaN(p)) {
      tOut.textContent = "0.00"; vOut.textContent = "0.00"; totalOut.textContent = "0.00";
      cpaBtn.classList.remove('active');
      return;
    }

    // 제1원칙 수식 연산 (글로벌 달러 기준)
    let tariff = p * T_RATE;
    let vat = (p + tariff) * V_RATE;
    let total = p + tariff + vat;

    // DOM 업데이트 (USD 달러 규격에 맞춰 소수점 2자리 센트 표기 강제)
    tOut.textContent = tariff.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    vOut.textContent = vat.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    totalOut.textContent = total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

    // 입력 발생 시 CPA 배너 즉시 노출
    cpaBtn.classList.add('active');
  });
})();
</script>
